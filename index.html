<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dadu-gyro</title>
  </head>
  <body>
    <div id="app">
      <button id="btnPermission">permission</button>
      <div class="card" id="card_acceleration">
        <table id="table_acceleration">
          <tr id="tr_acceleration_x">
            <td>acceleration_x:</td>
            <td id="acceleration_x"></td>
          </tr>
          <tr id="tr_acceleration_y">
            <td>acceleration_y:</td>
            <td id="acceleration_y"></td>
          </tr>
          <tr id="tr_acceleration_z">
            <td>acceleration_z:</td>
            <td id="acceleration_z"></td>
          </tr>
        </table>
      </div>
      <div class="card">
        <table>
          <tr>
            <td>acceleration_gravity_x:</td>
            <td id="acceleration_gravity_x"></td>
          </tr>
          <tr>
            <td>acceleration_gravity_y:</td>
            <td id="acceleration_gravity_y"></td>
          </tr>
          <tr>
            <td>acceleration_gravity_z:</td>
            <td id="acceleration_gravity_z"></td>
          </tr>
        </table>
      </div>
      <div class="card">
        <table>
          <tr>
            <td>gyro_x (beta):</td>
            <td id="gyro_beta"></td>
          </tr>
          <tr>
            <td>gyro_y (gamma):</td>
            <td id="gyro_gamma"></td>
          </tr>
          <tr>
            <td>gyro_z (alpha):</td>
            <td id="gyro_alpha"></td>
          </tr>
        </table>
      </div>
      <div class="card">
        <table>
          <tr>
            <td>orientation_x (beta):</td>
            <td id="orientation_x"></td>
          </tr>
          <tr>
            <td>orientation_y (gamma):</td>
            <td id="orientation_y"></td>
          </tr>
          <tr>
            <td>orientation_z (alpha):</td>
            <td id="orientation_z"></td>
          </tr>
        </table>
      </div>
      <script type="module" src="/src/main.js"></script>
  </body>
</html>
